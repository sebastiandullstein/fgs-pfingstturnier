<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FGS Pfingstturnier 2026 – Belegungsplan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue:        #3272B9;
      --blue-light:  #4a8fd4;
      --blue-dark:   #245a96;
      --dark:        #27282a;
      --dark-soft:   #3b3d40;
      --bg:          #eeeeee;
      --card:        #ffffff;
      --text:        #3b3d40;
      --muted:       #6b7280;
      --border:      #e2e5ea;
      --green:       #16a34a;
      --green-bg:    #ecfdf5;
      --green-border:#a7f3d0;
      --red:         #dc2626;
      --red-bg:      #fef2f2;
      --amber:       #f59e0b;
      --amber-bg:    #fffbeb;
      --radius:      8px;
      --radius-lg:   12px;
      --shadow:      0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.06);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lexend Deca', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Nav ── */
    .topnav {
      background: var(--dark);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      min-height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 4px;
    }
    .topnav .brand {
      color: #fff;
      font-weight: 700;
      font-size: .95rem;
      letter-spacing: -.02em;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .topnav .brand img { height: 28px; width: auto; border-radius: 2px; }
    .topnav .brand span { color: var(--blue-light); }
    .topnav nav { display: flex; gap: 4px; flex-wrap: wrap; }
    .topnav nav a {
      color: rgba(255,255,255,.7);
      text-decoration: none;
      font-size: .82rem;
      font-weight: 600;
      padding: 8px 14px;
      border-radius: 6px;
      transition: all .15s;
    }
    .topnav nav a:hover { color: #fff; background: rgba(255,255,255,.08); }
    .topnav nav a.active { color: #fff; background: var(--blue); }
    @media (max-width: 480px) {
      .topnav { padding: 8px 12px; }
      .topnav nav a { font-size: .75rem; padding: 6px 10px; }
      .btn-logout { font-size: .7rem; padding: 5px 10px; }
    }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 60%, var(--blue-light) 100%);
      color: #fff;
      padding: 28px 20px 24px;
      text-align: center;
    }
    .hero h1 {
      font-size: calc(1.1rem + .6vw);
      font-weight: 900;
      letter-spacing: -.03em;
      margin-bottom: 4px;
    }
    .hero p { font-size: .85rem; opacity: .7; }

    /* ── Layout ── */
    .container { max-width: 960px; margin: 0 auto; padding: 20px 16px 80px; }

    /* ── Stats ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    @media (max-width: 480px) {
      .stats-row { grid-template-columns: 1fr; }
    }
    .stat-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 18px 16px;
      text-align: center;
    }
    .stat-card .val {
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--blue);
      letter-spacing: -.03em;
    }
    .stat-card .lbl {
      font-size: .72rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-top: 2px;
    }

    /* ── Day Tabs ── */
    .day-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .day-tab {
      padding: 10px 20px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      font-family: inherit;
      font-size: .84rem;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .day-tab:hover { border-color: var(--blue-light); color: var(--text); }
    .day-tab.active { border-color: var(--blue); background: var(--blue); color: #fff; }
    .day-tab .badge {
      font-size: .65rem;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 10px;
      background: rgba(0,0,0,.08);
    }
    .day-tab.active .badge { background: rgba(255,255,255,.25); }

    /* ── Table ── */
    .table-wrap {
      background: var(--card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 20px;
    }
    .table-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 600px;
    }
    thead th {
      background: var(--dark);
      color: #fff;
      font-size: .75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
      padding: 14px 14px;
      text-align: left;
      white-space: nowrap;
      position: sticky;
      top: 0;
    }
    thead th:first-child { border-radius: 0; }
    thead th .cap-hint {
      display: block;
      font-size: .62rem;
      font-weight: 400;
      opacity: .7;
      text-transform: none;
      letter-spacing: 0;
      margin-top: 2px;
    }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8fafc; }
    tbody td {
      padding: 12px 14px;
      vertical-align: top;
      font-size: .82rem;
    }
    tbody td:first-child {
      font-weight: 700;
      white-space: nowrap;
      color: var(--dark);
      background: #f9fafb;
      border-right: 1px solid var(--border);
      min-width: 120px;
    }
    .td-youth {
      display: block;
      font-size: .65rem;
      font-weight: 600;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ── Cell States ── */
    .cell-empty {
      color: var(--muted);
      font-style: italic;
      font-size: .76rem;
    }
    .cell-name {
      display: block;
      padding: 3px 0;
      font-weight: 600;
      font-size: .8rem;
      line-height: 1.4;
    }
    .cell-remaining {
      display: inline-block;
      margin-top: 4px;
      font-size: .62rem;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: .03em;
    }
    .cell-remaining.green  { background: var(--green-bg); color: var(--green); }
    .cell-remaining.amber  { background: var(--amber-bg); color: var(--amber); }
    .cell-remaining.red    { background: var(--red-bg); color: var(--red); }
    .cell-remaining.full   { background: var(--red-bg); color: var(--red); }

    td.cell-full { background: #fef2f2; }
    td.cell-partial { background: #fffbeb; }
    td.cell-free { background: #fff; }

    /* ── Spenden Section ── */
    .section-title {
      font-size: .95rem;
      font-weight: 900;
      letter-spacing: -.02em;
      color: var(--dark);
      margin-bottom: 12px;
    }
    .spenden-table {
      min-width: auto;
    }
    .spenden-table thead th {
      background: var(--blue-dark);
    }
    .spenden-check {
      font-size: 1rem;
      text-align: center;
      font-weight: 700;
    }
    .spenden-check.yes { color: var(--green); }
    .spenden-check.no  { color: var(--border); }

    /* ── Empty State ── */
    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; opacity: .5; }
    .empty-state p { font-size: .9rem; }
    .empty-state a {
      display: inline-block;
      margin-top: 14px;
      padding: 10px 22px;
      background: var(--blue);
      color: #fff;
      border-radius: var(--radius);
      text-decoration: none;
      font-size: .84rem;
      font-weight: 700;
    }
    .empty-state a:hover { background: var(--blue-dark); }

    /* ── Refresh ── */
    .refresh-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 12px;
    }
    .btn-refresh {
      padding: 7px 14px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      font-family: inherit;
      font-size: .76rem;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
    }
    .btn-refresh:hover { border-color: var(--blue); color: var(--blue); }
    /* ── Login Overlay ── */
    .login-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .login-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 32px 28px;
      max-width: 360px;
      width: 90%;
      text-align: center;
    }
    .login-card h2 {
      font-size: 1.1rem;
      font-weight: 900;
      margin-bottom: 20px;
      color: var(--dark);
    }
    .login-card .field {
      margin-bottom: 12px;
      text-align: left;
    }
    .login-card .field label {
      display: block;
      font-size: .72rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 4px;
    }
    .login-card .field input {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: .9rem;
      outline: none;
      transition: border-color .15s;
    }
    .login-card .field input:focus { border-color: var(--blue); }
    .login-card .login-error {
      background: var(--red-bg);
      color: var(--red);
      padding: 8px 12px;
      border-radius: var(--radius);
      font-size: .8rem;
      font-weight: 600;
      margin-bottom: 12px;
      display: none;
    }
    .login-card .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: .92rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
    }
    .login-card .btn-login:hover { background: var(--blue-dark); }

    /* ── Delete Button ── */
    .btn-delete {
      background: none;
      border: 1px solid var(--red);
      color: var(--red);
      font-family: inherit;
      font-size: .68rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      transition: all .15s;
      margin-left: 6px;
    }
    .btn-delete:hover { background: var(--red); color: #fff; }

    /* ── Logout ── */
    .btn-logout {
      background: none;
      border: 1px solid rgba(255,255,255,.3);
      color: rgba(255,255,255,.7);
      font-family: inherit;
      font-size: .76rem;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-logout:hover { border-color: #fff; color: #fff; }
  </style>
</head>
<body>

<!-- ── Login Overlay (hidden by default) ── -->
<div class="login-overlay" id="login-overlay" style="display:none">
  <div class="login-card">
    <h2>Admin-Anmeldung</h2>
    <div class="login-error" id="login-error">Falscher Benutzername oder Passwort</div>
    <div class="field">
      <label>Benutzername</label>
      <input type="text" id="login-user" placeholder="Benutzername" />
    </div>
    <div class="field">
      <label>Passwort</label>
      <input type="password" id="login-pass" placeholder="Passwort" onkeydown="if(event.key==='Enter')doLogin()" />
    </div>
    <br />
    <button class="btn-login" onclick="doLogin()">Anmelden</button>
  </div>
</div>

<!-- ── Navigation ── -->
<div class="topnav">
  <a class="brand" href="/"><img src="/logo.jpg" alt="FGS" /> <span>FGS</span> Pfingstturnier</a>
  <nav>
    <a href="/">Anmelden</a>
    <a href="/admin.html" class="active">Belegungsplan</a>
    <a href="/rezept.html">Rezept</a>
    <button class="btn-logout" id="btn-admin-login" onclick="showLoginOverlay()">Admin</button>
    <button class="btn-logout" id="btn-logout" style="display:none" onclick="doLogout()">Abmelden</button>
  </nav>
</div>

<!-- ── Hero ── -->
<div class="hero">
  <h1>Belegungsplan</h1>
  <p>Übersicht aller Helfer-Anmeldungen</p>
</div>

<div class="container" id="main-content">

  <!-- ── Stats ── -->
  <div class="stats-row" id="stats-row">
    <div class="stat-card"><div class="val" id="stat-total">–</div><div class="lbl">Anmeldungen</div></div>
    <div class="stat-card"><div class="val" id="stat-spenden">–</div><div class="lbl">Spenden zugesagt</div></div>
    <div class="stat-card"><div class="val" id="stat-open">–</div><div class="lbl">Plätze offen</div></div>
  </div>

  <!-- ── Refresh ── -->
  <div class="refresh-bar">
    <button class="btn-refresh" onclick="loadData()">&#x21bb; Aktualisieren</button>
  </div>

  <!-- ── Day Tabs ── -->
  <div class="day-tabs" id="day-tabs"></div>

  <!-- ── Table ── -->
  <div class="table-wrap">
    <div class="table-scroll">
      <table id="plan-table">
        <thead id="plan-thead"></thead>
        <tbody id="plan-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- ── Spenden ── -->
  <h3 class="section-title" id="spenden-title">Spendenzusagen</h3>
  <div class="table-wrap">
    <div class="table-scroll">
      <table class="spenden-table" id="spenden-table">
        <thead id="spenden-thead"></thead>
        <tbody id="spenden-tbody"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
let CONFIG = {};
let registrations = [];
let availability = {};
let activeDay = null;
let authToken = null;

function isAdmin() { return !!authToken; }

// ── Login ──
function showLoginOverlay() {
  document.getElementById('login-overlay').style.display = '';
  document.getElementById('login-error').style.display = 'none';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-user').focus();
}

function doLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  const token = 'Basic ' + btoa(user + ':' + pass);

  if (user === 'FGS' && pass === '1234') {
    authToken = token;
    sessionStorage.setItem('adminAuth', token);
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('btn-admin-login').style.display = 'none';
    document.getElementById('btn-logout').style.display = '';
    // Re-render to show delete buttons
    if (activeDay) renderDay(activeDay);
    renderSpenden();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

function doLogout() {
  authToken = null;
  sessionStorage.removeItem('adminAuth');
  document.getElementById('btn-admin-login').style.display = '';
  document.getElementById('btn-logout').style.display = 'none';
  // Re-render to hide delete buttons
  if (activeDay) renderDay(activeDay);
  renderSpenden();
}

// Auto-login from session
(function checkSession() {
  const saved = sessionStorage.getItem('adminAuth');
  if (saved) {
    authToken = saved;
    document.getElementById('btn-admin-login').style.display = 'none';
    document.getElementById('btn-logout').style.display = '';
  }
})();

// Close login overlay on background click
document.getElementById('login-overlay').addEventListener('click', function(e) {
  if (e.target === this) this.style.display = 'none';
});

async function init() {
  await loadData();
  buildDayTabs();
  selectFirstDay();
}

async function loadData() {
  [CONFIG, registrations, availability] = await Promise.all([
    fetch('/api/config').then(r => r.json()),
    fetch('/api/admin/registrations').then(r => r.json()),
    fetch('/api/availability').then(r => r.json()),
  ]);
  updateStats();
  if (activeDay) renderDay(activeDay);
  renderSpenden();
}

// ── Stats ──
function updateStats() {
  const total = registrations.length;
  const spenden = registrations.filter(r => r.spenden && r.spenden.length > 0).length;
  let open = 0;
  for (const [dayId, day] of Object.entries(CONFIG.days)) {
    for (const slot of day.slots) {
      for (const stand of day.stands) {
        const a = availability[dayId]?.[slot.id]?.[stand.id];
        if (a) open += Math.max(0, a.remaining);
      }
    }
  }
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-spenden').textContent = spenden;
  document.getElementById('stat-open').textContent = open;
}

// ── Day Tabs ──
function buildDayTabs() {
  const container = document.getElementById('day-tabs');
  container.innerHTML = Object.entries(CONFIG.days).map(([id, day]) => {
    const count = registrations.filter(r => r.day === id).length;
    return `<button class="day-tab" data-day="${id}" onclick="selectDay('${id}')">
      ${day.label}
      <span class="badge">${count}</span>
    </button>`;
  }).join('');
}

function selectFirstDay() {
  const first = Object.keys(CONFIG.days)[0];
  if (first) selectDay(first);
}

function selectDay(dayId) {
  activeDay = dayId;
  document.querySelectorAll('.day-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.day === dayId));
  renderDay(dayId);
  renderSpenden();
}

// ── Table ──
function renderDay(dayId) {
  const day = CONFIG.days[dayId];
  if (!day) return;

  const thead = document.getElementById('plan-thead');
  thead.innerHTML = `<tr>
    <th>Zeitslot</th>
    ${day.stands.map(st =>
      `<th>${esc(st.label)}<span class="cap-hint">max. ${st.capacity} Person${st.capacity>1?'en':''}</span></th>`
    ).join('')}
  </tr>`;

  const tbody = document.getElementById('plan-tbody');
  tbody.innerHTML = day.slots.map(slot => {
    const youthLabels = slot.youth.map(y => CONFIG.jugendMapping[y]?.label ?? y).join(', ');
    const cells = day.stands.map(stand => {
      const a = availability[dayId]?.[slot.id]?.[stand.id];
      const cap = a ? a.capacity : stand.capacity;
      const names = a ? a.names : [];
      const rem = cap - names.length;
      const cellClass = rem <= 0 ? 'cell-full' : names.length > 0 ? 'cell-partial' : 'cell-free';

      // Find registration IDs for delete buttons
      const regsInCell = registrations.filter(r =>
        r.day === dayId && r.slotId === slot.id && r.standId === stand.id);

      let content = '';
      if (regsInCell.length > 0) {
        content = regsInCell.map(r =>
          `<span class="cell-name">${esc(r.name)}${isAdmin() ? `<button class="btn-delete" onclick="deleteReg(${r.id})" title="Eintrag löschen">&#10005;</button>` : ''}</span>`
        ).join('');
      }
      if (rem > 0) {
        content += `<span class="cell-remaining green">${rem} frei</span>`;
      } else if (rem <= 0 && regsInCell.length > 0) {
        content += `<span class="cell-remaining full">Voll</span>`;
      }
      if (regsInCell.length === 0 && rem > 0) {
        content = `<span class="cell-empty">${cap} ${cap>1?'Plätze':'Platz'} frei</span>`;
      }

      return `<td class="${cellClass}">${content}</td>`;
    }).join('');

    return `<tr>
      <td>${slot.label}<span class="td-youth">${esc(youthLabels)}</span></td>
      ${cells}
    </tr>`;
  }).join('');

  buildDayTabs();
  document.querySelectorAll('.day-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.day === activeDay));
}

// ── Delete ──
async function deleteReg(id) {
  if (!confirm('Diesen Eintrag wirklich löschen?')) return;
  try {
    const res = await fetch(`/api/admin/registrations/${id}`, {
      method: 'DELETE',
      headers: { 'Authorization': authToken },
    });
    if (res.ok) {
      await loadData();
    } else {
      const data = await res.json();
      alert(data.error || 'Fehler beim Löschen.');
    }
  } catch {
    alert('Verbindungsfehler.');
  }
}

// ── Spenden Table (filtered by active day) ──
function renderSpenden() {
  const items = CONFIG.spendenItems || [];
  const spendenRegs = registrations.filter(r =>
    r.spenden && r.spenden.length > 0 && r.day === activeDay);

  const dayLabel = activeDay ? (CONFIG.days[activeDay]?.label ?? '') : '';
  document.getElementById('spenden-title').textContent = `Spendenzusagen – ${dayLabel}`;

  const thead = document.getElementById('spenden-thead');
  thead.innerHTML = `<tr>
    <th>Name</th>
    <th>Jugend</th>
    ${items.map(i => `<th style="text-align:center">${esc(i.label)}</th>`).join('')}
    ${isAdmin() ? '<th></th>' : ''}
  </tr>`;

  const tbody = document.getElementById('spenden-tbody');
  if (spendenRegs.length === 0) {
    tbody.innerHTML = `<tr><td colspan="${3 + items.length}" style="text-align:center;padding:30px;color:var(--muted);font-style:italic">
      Keine Spendenzusagen f&uuml;r ${esc(dayLabel)}
    </td></tr>`;
    return;
  }

  tbody.innerHTML = spendenRegs.map(r => {
    const jugLabel = CONFIG.jugendMapping[r.jugend]?.label ?? r.jugend;
    const cells = items.map(i => {
      const has = r.spenden.includes(i.id);
      return `<td class="spenden-check ${has ? 'yes' : 'no'}" style="text-align:center">${has ? '&#10003;' : '–'}</td>`;
    }).join('');
    return `<tr>
      <td style="font-weight:700">${esc(r.name)}</td>
      <td>${esc(jugLabel)}</td>
      ${cells}
      ${isAdmin() ? `<td><button class="btn-delete" onclick="deleteReg(${r.id})" title="Eintrag löschen">&#10005;</button></td>` : ''}
    </tr>`;
  }).join('');

  const totals = items.map(i => {
    const count = spendenRegs.filter(r => r.spenden.includes(i.id)).length;
    return `<td style="text-align:center;font-weight:900;color:var(--blue)">${count}</td>`;
  }).join('');
  tbody.innerHTML += `<tr style="border-top:2px solid var(--border);background:#f8fafc">
    <td colspan="2" style="font-weight:900;color:var(--dark)">Gesamt</td>
    ${totals}
    ${isAdmin() ? '<td></td>' : ''}
  </tr>`;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

init();
</script>
</body>
</html>
